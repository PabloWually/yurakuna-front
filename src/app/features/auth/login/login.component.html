<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-container">
        <img src="/logo.jpg" alt="Yurakuna Logo" class="logo">
      </div>
      <mat-card-title>Iniciar Sesión</mat-card-title>
      <mat-card-subtitle>Ingresa tus credenciales para continuar</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Email</mat-label>
          <input 
            matInput 
            type="email" 
            formControlName="email" 
            placeholder="tu@email.com"
            autocomplete="email">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error>{{ getErrorMessage('email') }}</mat-error>
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input 
            matInput 
            [type]="hidePassword() ? 'password' : 'text'" 
            formControlName="password"
            autocomplete="current-password">
          <mat-icon matPrefix>lock</mat-icon>
          <button 
            mat-icon-button 
            matSuffix 
            type="button"
            (click)="hidePassword.set(!hidePassword())"
            [attr.aria-label]="'Ocultar contraseña'">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error>{{ getErrorMessage('password') }}</mat-error>
        </mat-form-field>

        <button 
          mat-raised-button 
          color="primary" 
          type="submit" 
          class="full-width submit-button"
          [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
            <span class="ml-2">Iniciando sesión...</span>
          } @else {
            Iniciar Sesión
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="register-link">
        ¿No tienes cuenta? 
        <a routerLink="/auth/register">Regístrate aquí</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
